<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="100%" height="100%">
  <defs>
    <!-- Premium Gold Linear Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E7C4" />
      <stop offset="30%" stop-color="#E5C158" />
      <stop offset="70%" stop-color="#C5A039" />
      <stop offset="100%" stop-color="#916F1F" />
    </linearGradient>
  </defs>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&amp;display=swap');
    .brand-title {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 700;
      font-size: 29px;
      fill: url(#goldGrad);
      letter-spacing: 5px;
    }
    .brand-sub {
      font-family: 'Outfit', 'Inter', sans-serif;
      font-weight: 500;
      font-size: 11px;
      fill: #E2E8F0;
      letter-spacing: 9.5px;
      opacity: 0.9;
    }
  </style>

  <g transform="translate(5, 0)">
    <!-- Stylized 'A' Emblem -->
    <!-- Outer Hollow Triangle (A Shape) -->
    <path d="M 37.5,12 L 70,64 L 58,64 L 37.5,29 L 17,64 L 5,64 Z" fill="url(#goldGrad)" />
    
    <!-- Candlestick Imbalances inside the A -->
    <!-- Left Candlestick -->
    <line x1="28" y1="62" x2="28" y2="43" stroke="url(#goldGrad)" stroke-width="1.2" />
    <rect x="26.5" y="45" width="3" height="15" fill="url(#goldGrad)" rx="0.5" />
    
    <!-- Middle Candlestick -->
    <line x1="36" y1="62" x2="36" y2="35" stroke="url(#goldGrad)" stroke-width="1.2" />
    <rect x="34.5" y="37" width="3" height="23" fill="url(#goldGrad)" rx="0.5" />
    
    <!-- Right Candlestick -->
    <line x1="44" y1="62" x2="44" y2="41" stroke="url(#goldGrad)" stroke-width="1.2" />
    <rect x="42.5" y="43" width="3" height="17" fill="url(#goldGrad)" rx="0.5" />
    
    <!-- Sweeping Trend Arrow -->
    <path d="M 8,62 Q 35,52 48,35 T 75,20" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Arrow Head -->
    <polygon points="75,20 63,22 68,28" fill="url(#goldGrad)" />
    
    <!-- Vertical Divider Line -->
    <line x1="82" y1="18" x2="82" y2="62" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.3" />
    
    <!-- Text Elements -->
    <text x="96" y="41" class="brand-title">AUREX</text>
    <text x="97" y="65" class="brand-sub">CAPITAL</text>
  </g>
</svg>
